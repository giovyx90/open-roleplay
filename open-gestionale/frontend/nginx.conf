server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: ogni rotta sconosciuta ricade su index.html (routing lato client).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Asset con hash: cache lunga.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
