# Open Jobs - fantasy: scala di anzianità. 4 tier, nessun decadimento.
progression:
  tiers:
    - id: apprendista
      order: 0
      sessions_required: 0
      pay_multiplier: 1.0
      display_name: "Apprendista"
    - id: artigiano
      order: 1
      sessions_required: 25
      pay_multiplier: 1.15
      display_name: "Artigiano"
    - id: esperto
      order: 2
      sessions_required: 80
      pay_multiplier: 1.3
      display_name: "Esperto"
    - id: maestro
      order: 3
      sessions_required: 200
      pay_multiplier: 1.5
      display_name: "Maestro"

  decay:
    enabled: false
