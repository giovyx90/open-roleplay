# ============================================================================
#  Open Crime - illegal goods catalogue
#  ---------------------------------------------------------------------------
#  THIS IS WHERE THE SETTING LIVES. The core only ever handles "an illegal good
#  with this id, danger level and street value". Names, categories and item look
#  are config. danger_level (1..5) is narrative only - a judge may weigh it; it
#  never triggers anything on its own. street_value is the base value per unit,
#  read by the traffic and economy layers.
#
#  Give items a CustomModelData and ship a resource pack to make them look right;
#  without one they fall back to the chosen material.
# ============================================================================

goods:
  cocaina:
    display_name: "Cocaina"
    category: narcotic
    danger_level: 4
    street_value: 800
    item_material: SUGAR
    item_custom_model_data: 7101
    item_name: "&fCocaina"
    item_lore:
