command:
  header: "Open Companies commands:"
  help:
    help: "/company help - show this help"
    create: "/company create <name> <type> - found a company"
    apply: "/company apply <name> <type> [description] - submit a company application"
    list: "/company list - list companies"
    info: "/company info [company] - show a company's details"
    members: "/company members - list your company's members"
    invite: "/company invite <player> <role> | accept | deny"
    fire: "/company fire <player> - remove a member"
    role: "/company role <player> <role> - change a member's role"
    leave: "/company leave - leave your company"
    licenses: "/company licenses - show your company's licenses"
    assets: "/company assets - list your company's assets"
    assets_register: "/company assets register <type> - bind the block you're looking at"
    admin: "/company admin - staff commands"
  admin:
    header: "Open Companies staff commands:"
    help:
      create: "/company admin create <owner> <name> <type>"
      delete: "/company admin delete <company>"
      setstatus: "/company admin setstatus <company> <ACTIVE|SUSPENDED|DISSOLVED>"
      setowner: "/company admin setowner <company> <player>"
      license: "/company admin license <grant|revoke> <company> <license>"
      sethq: "/company admin sethq <company> - set HQ to your position"
      givecash: "/company admin givecash <player> <amount> - hand out banknotes"
      givecard: "/company admin givecard <player> - issue a payment card"
      applications: "/company admin applications - list pending applications"
      approve: "/company admin approve <id>"
      deny: "/company admin deny <id> [reason]"
      reload: "/company admin reload"

