# Open Politics - configurazione OLIGARCHIA.
# Un Consiglio dei Cinque: cinque cariche paritarie, nessuna superiore alle altre, mandato
# illimitato. Una sola categoria di legge. Nessuna elezione popolare: il Consiglio coopta i propri
# membri per nomina interna.
branding:
  product-name: "Consiglio dei Cinque"
  message-prefix: "<dark_aqua>[Consiglio]</dark_aqua> "

messages:
  language: auto
  fallback: it

modules:
  charges: true
  government: true
  acts: true
  laws: true

adapters:
  storage: yaml

storage:
  file: politics-data.yml

time:
  scale: 1.0

acts:
  id_pattern: "{numero}/{anno}"
  physical_book: true

laws:
  public_registry: true
  historical_archive: true
  link_openfdo: true

elections:
  announce_opening: false
  announce_results: false
  anonymous_voting: true
  check_interval_minutes: 5

debug: false
