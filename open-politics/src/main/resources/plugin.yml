name: OpenPolitics
version: '${project.version}'
main: dev.openrp.politics.OpenPoliticsPlugin
api-version: '1.21'
description: Adapter-first, setting-neutral political engine for Paper roleplay - charges, governments, elections, signed acts and a public law registry. The plugin certifies authority and records decisions; it never executes their consequences.
authors: [Open Roleplay Workshop]
# Every entry below is an OPTIONAL soft dependency. The core works without any of them:
# - OpenCore      -> module lifecycle integration (reflective, optional)
# - OpenFDO       -> authority bridge: emergency state and law-backed charges (AuthorityAdapter)
# - OpenCompanies -> licence-revocation authority recognition (CompanyAdapter)
# - OpenEconomy   -> public budget access for MANAGE_BUDGET holders (EconomyAdapter)
# - OpenIdentity  -> physical institutional ID card for charge holders (IdentityAdapter)
# - LuckPerms     -> permission routing (handled through the Bukkit permission layer)
# - WorldGuard    -> region control for the 'conquest' assignment mechanism (RegionAdapter)
# OpenPolitics discovers all of these at runtime and silently degrades the matching feature when one
# is absent. Authority never comes from a permission node: it comes from the charge a player holds.
softdepend: [OpenCore, OpenFDO, OpenCompanies, OpenEconomy, OpenIdentity, LuckPerms, WorldGuard]

commands:
  openpolitics:
    description: Administration and status for Open Politics.
    usage: /openpolitics <status|reload>
    aliases: [opolitics]
    permission: openpolitics.use
  politica:
    description: The political system - charges, government, acts and the law registry.
    usage: /politica <cariche|leggi|atti|governo|atto|nomina|veto|...>
    aliases: [politics, gov]
    permission: openpolitics.use
  voto:
    description: Take part in elections - candidacies and voting.
    usage: /voto <lista|candidatura|risultati|...>
    aliases: [vote, elezioni]
    permission: openpolitics.use

permissions:
  openpolitics.*:
    description: Grants every Open Politics permission.
    default: op
    children:
      openpolitics.use: true
      openpolitics.admin: true
      openpolitics.reload: true
  openpolitics.use:
    description: Allows using the Open Politics commands. Real authority comes from the charge a player holds, not from this node.
    default: true
  openpolitics.admin:
    description: Staff control - bypass charge capability checks, manage governments and charges, force elections, reload.
    default: op
    children:
      openpolitics.reload: true
  openpolitics.reload:
    description: Allows reloading Open Politics configuration.
    default: op
