name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da pubblicare, per esempio v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Marca la release come pre-release"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Set Maven version from tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$GITHUB_REF_NAME"
          fi
          # Reject tags that aren't v<semver> so a typo can't publish a garbage version.
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is not a valid v<semver> tag (e.g. v0.1.0 or v0.1.0-rc1)."
            exit 1
          fi
          mvn -B -ntp versions:set -DnewVersion="${tag#v}" -DgenerateBackupPoms=false

      - name: Build modules and resource packs
        run: mvn -B -ntp verify

      - name: Prepare release assets
        run: scripts/prepare-release-assets.sh release-assets

      - name: Upload GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref_name, '-') }}
          files: release-assets/*
