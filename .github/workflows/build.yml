name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B -ntp package
      - run: scripts/prepare-release-assets.sh release-assets
      - uses: actions/upload-artifact@v4
        with:
          name: open-roleplay-release-assets
          path: release-assets/
