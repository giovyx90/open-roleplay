name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      # verify runs the unit tests (CONTRIBUTING tells contributors to do the same).
      - run: mvn -B -ntp verify
      - run: scripts/prepare-release-assets.sh release-assets
      - uses: actions/upload-artifact@v4
        with:
          name: open-roleplay-release-assets
          path: release-assets/
